name: Bug Report
description: Report a bug in Wrench
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Wrench version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.1"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. Ubuntu 22.04 / macOS 14 / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Harvester
        - Grouper
        - MetadataEnricher
        - Cataloger
        - Pipeline
        - Scheduler
        - Utils / Config
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the behaviour.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
