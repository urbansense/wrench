name: PR Code Quality

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.12
      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
        with:
          version: "0.6.x"
      - name: Install dependencies
        run: |
          uv sync --group lint
      - name: Run linting
        run: |
          make lint
      - name: Check formatting
        run: |
          uv run --group lint ruff format --diff wrench tests
      - name: Add spellcheck
        run: |
          make spell_check
      - name: Type checking
        run: |
          make lint_types
