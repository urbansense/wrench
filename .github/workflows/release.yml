name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: {}

jobs:
  # ── Generate release notes and create GitHub Release ─────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release create
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # full history needed for git-cliff

      - name: Install git-cliff
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: git-cliff

      - name: Generate changelog for this release
        run: |
          git cliff --body .github/cliff-template.tera --latest --strip header > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md

  # ── Build and publish to PyPI via Trusted Publisher (OIDC) ───────
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    environment:
      name: pypi-release
    permissions:
      id-token: write  # needed for Trusted Publisher OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - run: uv build
      - run: uv publish --trusted-publishing always
